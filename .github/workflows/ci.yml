name: CI

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
      - release-*

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate .asf.yaml
        run: pip install pyyaml -q && python3 tools/validate_asf_yaml.py

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0

      - name: Check dependency licenses (Apache-compatible)
        run: cargo deny check licenses

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test with coverage
        run: cargo llvm-cov --workspace --summary-only

  c-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build FFI library
        run: cargo build --release -p paimon-vindex-ffi

      - name: Build C test
        run: |
          cmake -S c -B c/build \
            -DPAIMON_VINDEX_FFI_LIB=${{ github.workspace }}/target/release/libpaimon_vindex_ffi.so
          cmake --build c/build

      - name: Run C test
        run: c/build/test_vindex
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  cpp-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build FFI library
        run: cargo build --release -p paimon-vindex-ffi

      - name: Build C++ test
        run: |
          cmake -S cpp -B cpp/build \
            -DPAIMON_VINDEX_FFI_LIB=${{ github.workspace }}/target/release/libpaimon_vindex_ffi.so
          cmake --build cpp/build

      - name: Run C++ test
        run: cpp/build/test_vindex_cpp
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  jni-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Test Java API
        run: mvn -f java/pom.xml test

      - name: Build JNI library
        run: cargo build -p paimon-vindex-jni --release

      - name: Test JNI native behavior
        run: |
          java -cp java/target/test-classes:java/target/classes org.apache.paimon.index.vector.VectorIndexNativeValidationTest \
            "$(pwd)/target/release/libpaimon_vindex_jni.so"
          java -cp java/target/test-classes:java/target/classes org.apache.paimon.index.vector.VectorIndexNativePanicBoundaryTest \
            "$(pwd)/target/release/libpaimon_vindex_jni.so"
          java -cp java/target/test-classes:java/target/classes org.apache.paimon.index.vector.VectorIndexNativeHandleSafetyTest \
            "$(pwd)/target/release/libpaimon_vindex_jni.so"

  python-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build FFI library
        run: cargo build --release -p paimon-vindex-ffi

      - name: Test Python API
        working-directory: python
        run: |
          pip install -e ".[test]"
          pytest -v
        env:
          PAIMON_VINDEX_LIB_PATH: ${{ github.workspace }}/target/release

  python-wheel:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build FFI library
        run: cargo build --release -p paimon-vindex-ffi

      - name: Build wheel
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Test wheel
        if: runner.os != 'Windows'
        working-directory: python
        run: |
          python -m pip install dist/*.whl
          cd ..
          python - <<'PY'
          import io
          import numpy as np
          from paimon_vindex import VectorIndexReader, VectorIndexWriter

          class Input:
              def __init__(self, data):
                  self.data = data

              def pread_many(self, ranges):
                  return [self.data[pos : pos + length] for pos, length in ranges]

          data = np.array([[0.0, 0.0], [0.1, 0.0], [10.0, 10.0], [10.1, 10.0]], dtype=np.float32)
          ids = np.array([1, 2, 3, 4], dtype=np.int64)
          output = io.BytesIO()
          writer = VectorIndexWriter({"index.type": "ivf_flat", "dimension": "2", "nlist": "2", "metric": "l2"})
          writer.train(data)
          writer.add_vectors(ids, data)
          writer.write(output)
          writer.close()

          reader = VectorIndexReader(Input(output.getvalue()))
          reader.optimize_for_search()
          result_ids, distances = reader.search(data[0], top_k=2, nprobe=2)
          assert result_ids[0] == 1, result_ids
          assert np.isfinite(distances[0]), distances
          reader.close()
          PY

      - name: Test wheel
        if: runner.os == 'Windows'
        working-directory: python
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          python -m pip install $wheel.FullName
          Set-Location ..
          python -c @'
          import io
          import numpy as np
          from paimon_vindex import VectorIndexReader, VectorIndexWriter

          class Input:
              def __init__(self, data):
                  self.data = data

              def pread_many(self, ranges):
                  return [self.data[pos : pos + length] for pos, length in ranges]

          data = np.array([[0.0, 0.0], [0.1, 0.0], [10.0, 10.0], [10.1, 10.0]], dtype=np.float32)
          ids = np.array([1, 2, 3, 4], dtype=np.int64)
          output = io.BytesIO()
          writer = VectorIndexWriter({"index.type": "ivf_flat", "dimension": "2", "nlist": "2", "metric": "l2"})
          writer.train(data)
          writer.add_vectors(ids, data)
          writer.write(output)
          writer.close()

          reader = VectorIndexReader(Input(output.getvalue()))
          reader.optimize_for_search()
          result_ids, distances = reader.search(data[0], top_k=2, nprobe=2)
          assert result_ids[0] == 1, result_ids
          assert np.isfinite(distances[0]), distances
          reader.close()
          '@
